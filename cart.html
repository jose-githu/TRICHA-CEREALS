<!DOCTYPE html><html><head><title>Your Cart</title><meta name="viewport" content="width=device-width, initial-scale=1">
<style>body{font-family:Arial;padding:12px;background:#f7f7f7}.card{background:#fff;padding:12px;border-radius:8px;margin-bottom:10px}</style></head><body>
<h2>Your Cart</h2>
<div id="cartList" class="card"></div>
<h3>Total: KES <span id="total">0</span></h3>
<button onclick="checkoutWhatsApp()">Checkout on WhatsApp</button>
<button onclick="openPaymentMock()">Payment Mock</button>
<br><br><a href="index.html">Back</a>
<script>
function loadCart(){
  const cart = JSON.parse(localStorage.getItem('cart')||'[]');
  const el = document.getElementById('cartList');
  el.innerHTML = '';
  let total=0;
  cart.forEach((it, idx)=>{ el.innerHTML += '<div>'+it.name+' - KES '+it.price+' <button onclick="remove('+idx+')">Remove</button></div>'; total+=it.price; });
  document.getElementById('total').innerText = total;
}
function remove(i){ let cart = JSON.parse(localStorage.getItem('cart')||'[]'); cart.splice(i,1); localStorage.setItem('cart', JSON.stringify(cart)); loadCart(); }
function checkoutWhatsApp(){
  const cart = JSON.parse(localStorage.getItem('cart')||'[]');
  if(cart.length===0){ alert('Cart empty'); return; }
  let text = 'Hello Trichas, I want to order:%0A';
  cart.forEach(it=> text += '- '+it.name+' ('+it.price+' KES)%0A');
  window.location.href = 'https://wa.me/254700000000?text=' + text;
}
function openPaymentMock(){ window.open('payment_mock.html','_blank'); }
loadCart();
</script>
</body></html>
