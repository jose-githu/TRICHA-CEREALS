<!DOCTYPE html><html><head><title>Product</title><meta name='viewport' content='width=device-width, initial-scale=1'><style>body{font-family:Arial;padding:12px;background:#f7f7f7}.card{background:#fff;padding:12px;border-radius:8px}</style></head><body><div id='product' class='card'></div><a href='index.html'>Back</a><script>const catalog = [{"id": 1, "name": "Maize Flour 2kg", "price": 180, "img": "https://via.placeholder.com/150?text=Maize"}, {"id": 2, "name": "Rice 2kg", "price": 250, "img": "https://via.placeholder.com/150?text=Rice"}, {"id": 3, "name": "Cooking Oil 1L", "price": 420, "img": "https://via.placeholder.com/150?text=Oil"}, {"id": 4, "name": "Ariel Detergent 500g", "price": 120, "img": "https://via.placeholder.com/150?text=Ariel"}, {"id": 5, "name": "Bar Soap", "price": 40, "img": "https://via.placeholder.com/150?text=Soap"}, {"id": 6, "name": "Body Lotion 250ml", "price": 250, "img": "https://via.placeholder.com/150?text=Lotion"}, {"id": 7, "name": "Face Cream", "price": 300, "img": "https://via.placeholder.com/150?text=Cream"}, {"id": 8, "name": "Tissue Pack", "price": 60, "img": "https://via.placeholder.com/150?text=Tissue"}, {"id": 9, "name": "Plate Set", "price": 620, "img": "https://via.placeholder.com/150?text=Plates"}]; function qs(name){ const u = new URLSearchParams(location.search); return u.get(name); } const id = parseInt(qs('id')||'0'); const p = catalog.find(x=>x.id===id); if(p){ document.getElementById('product').innerHTML = `<img src='${p.img}' width='100%'><h2>${p.name}</h2><div>KES ${p.price}</div><p>Simple product description for demo purposes.</p><button onclick="addToCart(${p.id})">Add to cart</button> <button onclick="checkoutPayment()">Payment Mock</button>`; } else { document.getElementById('product').innerHTML = '<h3>Product not found</h3>'; } function addToCart(id){ let cart = JSON.parse(localStorage.getItem('cart')||'[]'); const it = catalog.find(x=>x.id===id); cart.push(it); localStorage.setItem('cart', JSON.stringify(cart)); alert(it.name+' added to cart'); } function checkoutPayment(){ window.open('payment_mock.html','_blank'); } </script></body></html>
